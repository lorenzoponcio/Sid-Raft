services:
  node1:
    build: .
    container_name: raft-node1
    restart: on-failure
    environment:
      NODE_ID: node1
      PORT: "5000"
      PEERS: "node2,node3"
      ELECTION_MIN: "3"
      ELECTION_MAX: "6"
      HEARTBEAT_INTERVAL: "1.5"
    ports:
      - "5001:5000"
    networks:
      - raft-net

  node2:
    build: .
    container_name: raft-node2
    restart: on-failure
    environment:
      NODE_ID: node2
      PORT: "5000"
      PEERS: "node1,node3"
      ELECTION_MIN: "3"
      ELECTION_MAX: "6"
      HEARTBEAT_INTERVAL: "1.5"
    ports:
      - "5002:5000"
    networks:
      - raft-net

  node3:
    build: .
    container_name: raft-node3
    restart: on-failure
    environment:
      NODE_ID: node3
      PORT: "5000"
      PEERS: "node1,node2"
      ELECTION_MIN: "3"
      ELECTION_MAX: "6"
      HEARTBEAT_INTERVAL: "1.5"
    ports:
      - "5003:5000"
    networks:
      - raft-net

networks:
  raft-net:
    driver: bridge
