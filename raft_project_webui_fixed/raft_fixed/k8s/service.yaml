apiVersion: v1
kind: Service
metadata:
  name: raft
spec:
  clusterIP: None          # Headless service para DNS por pod
  selector:
    app: raft
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: raft-0-ext
spec:
  selector:
    statefulset.kubernetes.io/pod-name: raft-0
  ports:
    - port: 5001
      targetPort: 5000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: raft-1-ext
spec:
  selector:
    statefulset.kubernetes.io/pod-name: raft-1
  ports:
    - port: 5002
      targetPort: 5000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: raft-2-ext
spec:
  selector:
    statefulset.kubernetes.io/pod-name: raft-2
  ports:
    - port: 5003
      targetPort: 5000
  type: NodePort
